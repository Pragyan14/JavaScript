<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Learning</title>
    <style>
      body {
        background-color: #212121;
        color: #fff;
      }
      .diff {
        font-size: 24px;
        color: azure;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1 id="title" class="heading">DOM Manipulation</h1>
      <p class="content">
        Saepe impedit rerum odio deserunt. Harum eligendi illo nobis, odit ab
        veniam.
      </p>
      <ul>
        <li>One</li>
        <li>Two</li>
        <li>Three</li>
      </ul>
      <div id="parent">
        <div>Mnnday</div>
        <div>Tuesday</div>
        <div>Wednsaday</div>
        <div>Thursday</div>
      </div>
    </div>
  </body>
  <script>
    let parent = document.getElementById("parent");
    console.log(parent.children.length);
    for (let i = 0; i < parent.children.length; i++) {
      console.log(parent.children[i].innerHTML);
    }
  </script>
</html>
